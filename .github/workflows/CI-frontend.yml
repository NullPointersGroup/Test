name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
      - main
    paths:
      - frontend/src/**
      - frontend/tests/**
jobs:
  feature-frontend-tests:
    # needs: changes
    # if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test