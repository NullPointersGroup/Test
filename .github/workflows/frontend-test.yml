name: Viene lanciata solo quando il frontend viene modificato
on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/src/**'
      - 'frontend/tests/**'

  pull_request:
    paths:
      - 'frontend/src/**'
      - 'frontend/tests/**'

jobs:
  frontend-job:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
            node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test