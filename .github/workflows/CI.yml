name: CI

on:
  push:
    branches:
      - main
      - develop

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/src/**'
              - 'frontend/tests/**'
            backend:
              - 'backend/src/**'
              - 'backend/tests/**'

  frontend-tests:
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - run: if [[ "${{ needs.changes.outputs.frontend }}" != "true" ]]; then
            echo "No frontend changes, skipping"
            exit 0
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run vitest

  backend-tests:
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - run: if [[ "${{ needs.changes.outputs.frontend }}" != "true" ]]; then
            echo "No frontend changes, skipping"
            exit 0
          fi