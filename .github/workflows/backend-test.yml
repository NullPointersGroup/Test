name: Viene lanciata solo quando il frontend viene modificato
on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/src/**'
      - 'backend/tests/**'

  pull_request:
    paths:
      - 'backend/src/**'
      - 'backend/tests/**'

jobs:
  backend-job:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4